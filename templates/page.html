{% extends "base.html" %}
{% block content %}
<article class="single-post">
    {% set cover = page.extra.cover_image | default(value='images/placeholder.jpg') %}
    <header class="post-hero" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('{{ get_url(path=cover) }}')">
        <div class="container">
            <nav class="breadcrumb"><a href="{{ get_url(path="/") }}">Accueil</a> / <a href="{{ get_url(path=page.ancestors | last) }}">Section</a></nav>
            <h1>{{ page.title }}</h1>
            <div class="post-meta">Publié le {{ page.date }}</div>
        </div>
    </header>

    <div class="container post-container">
        <aside class="post-sidebar">
            <div class="author-box">
                <strong>Rédaction</strong>
                <p>Équipe {{ config.title }}</p>
            </div>
        </aside>
        
        <div class="post-content">
            {{ page.content | safe }}
        </div>
    </div>
</article>
{% endblock content %}
